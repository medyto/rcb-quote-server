<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Get a Quote – RCB Upholstery</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1208;
    --paper: #f5f0e8;
    --cream: #ede6d6;
    --gold: #c49a2a;
    --rust: #a0401a;
    --sage: #4a6741;
    --border: #c8b898;
    --shadow: rgba(26,18,8,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Mono', monospace;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 15% 15%, rgba(196,154,42,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 85% 85%, rgba(160,64,26,0.06) 0%, transparent 50%);
  }

  header {
    padding: 20px 40px 28px;
    text-align: center;
    background: white;
    border-bottom: 1.5px solid var(--border);
  }
  header img {
    max-width: 280px;
    width: 100%;
    height: auto;
    display: inline-block;
  }

  .container { max-width: 780px; margin: 0 auto; padding: 48px 24px; }

  .intro {
    margin-bottom: 36px;
    padding: 20px 24px;
    border-left: 3px solid var(--gold);
    background: rgba(196,154,42,0.05);
    font-size: 0.82rem;
    line-height: 1.8;
    color: #555;
  }

  .section {
    background: white;
    border: 1.5px solid var(--border);
    border-radius: 2px;
    margin-bottom: 20px;
    box-shadow: 4px 4px 0 var(--shadow);
  }

  .section-header {
    background: var(--ink);
    color: var(--paper);
    padding: 10px 20px;
    font-size: 0.63rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }
  .section-body { padding: 24px; }

  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }

  label { font-size: 0.63rem; letter-spacing: 0.12em; text-transform: uppercase; color: #777; font-weight: 500; }

  input, select {
    border: 1.5px solid var(--border);
    background: var(--paper);
    padding: 10px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: var(--ink);
    border-radius: 2px;
    outline: none;
    width: 100%;
    transition: border-color 0.15s, box-shadow 0.15s;
  }

  input:focus, select:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(196,154,42,0.15);
  }

  /* Cushion table */
  .cushion-table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
  .cushion-table th {
    text-align: left; padding: 8px 6px;
    font-size: 0.58rem; letter-spacing: 0.12em; text-transform: uppercase;
    color: #999; border-bottom: 1.5px solid var(--border); font-weight: 500;
  }
  .cushion-table td { padding: 5px 3px; vertical-align: middle; }
  .cushion-table input, .cushion-table select { padding: 7px 6px; font-size: 0.78rem; }

  .remove-btn {
    background: none; border: 1.5px solid var(--border); color: var(--rust);
    width: 26px; height: 26px; border-radius: 2px; cursor: pointer;
    font-size: 0.9rem; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; line-height: 1;
  }
  .remove-btn:hover { background: var(--rust); color: white; border-color: var(--rust); }

  .add-btn {
    margin-top: 12px; background: none; border: 1.5px dashed var(--border);
    color: var(--sage); padding: 8px 16px; font-family: 'DM Mono', monospace;
    font-size: 0.73rem; cursor: pointer; border-radius: 2px; transition: all 0.15s;
  }
  .add-btn:hover { border-color: var(--sage); background: rgba(74,103,65,0.05); }

  /* Extras */
  .extras-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .extra-item {
    display: flex; align-items: center; gap: 8px; padding: 10px 12px;
    border: 1.5px solid var(--border); border-radius: 2px; cursor: pointer;
    transition: all 0.15s; background: var(--paper); user-select: none;
  }
  .extra-item:hover { border-color: var(--gold); }
  .extra-item.checked { border-color: var(--gold); background: rgba(196,154,42,0.08); }
  .extra-item input[type=checkbox] { display: none; }
  .extra-check {
    width: 14px; height: 14px; border: 1.5px solid var(--border); border-radius: 2px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem; flex-shrink: 0; transition: all 0.15s;
  }
  .extra-item.checked .extra-check { background: var(--gold); border-color: var(--gold); color: white; }
  .extra-label { font-size: 0.75rem; }

  /* Submit */
  .submit-btn {
    width: 100%; padding: 16px; background: var(--ink); color: var(--paper);
    border: none; font-family: 'DM Mono', monospace; font-size: 0.8rem;
    letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer;
    border-radius: 2px; margin-top: 24px; transition: all 0.2s;
  }
  .submit-btn:hover { background: #2d1f0a; transform: translateY(-1px); box-shadow: 0 6px 20px var(--shadow); }
  .submit-btn:disabled { background: #aaa; cursor: not-allowed; transform: none; box-shadow: none; }

  /* Status messages */
  .status {
    padding: 16px 20px; border-radius: 2px; font-size: 0.8rem;
    line-height: 1.6; margin-top: 16px; display: none;
  }
  .status.loading { background: rgba(196,154,42,0.1); border: 1.5px solid var(--gold); color: #8a6a10; display: block; }
  .status.success { background: rgba(74,103,65,0.08); border: 1.5px solid var(--sage); color: var(--sage); display: block; }
  .status.error { background: rgba(160,64,26,0.08); border: 1.5px solid var(--rust); color: var(--rust); display: block; }
  .status.limit { background: #fff8f0; border: 2px solid var(--rust); color: var(--ink); display: block; text-align: center; padding: 28px; }

  .status.success .big { font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 6px; color: var(--sage); }
  .status.limit .big { font-family: 'DM Serif Display', serif; font-size: 1.3rem; margin-bottom: 10px; color: var(--rust); }
  .status.limit a { color: var(--ink); font-weight: 500; }

  /* Image upload */
  .img-upload-btn {
    display: inline-flex; align-items: center; justify-content: center;
    padding: 5px 10px; background: var(--paper); border: 1.5px dashed var(--border);
    border-radius: 2px; cursor: pointer; font-size: 0.7rem; color: var(--sage);
    white-space: nowrap; transition: all 0.15s; font-family: 'DM Mono', monospace;
  }
  .img-upload-btn:hover { border-color: var(--sage); background: rgba(74,103,65,0.05); }

  .img-previews { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 5px; max-width: 120px; }

  .img-thumb {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    font-size: 0.55rem; color: #999; max-width: 36px;
  }
  .img-thumb img { width: 34px; height: 34px; object-fit: cover; border: 1px solid var(--border); border-radius: 2px; }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    .extras-grid { grid-template-columns: 1fr 1fr; }
    header { padding: 18px 20px; }
    .container { padding: 24px 16px; }
  }

  /* Foam tooltip */
  .foam-th { white-space: nowrap; }
  .foam-info {
    display: inline-flex; align-items: center; justify-content: center;
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--gold); color: white;
    font-size: 0.6rem; font-weight: 700; cursor: help;
    margin-left: 5px; vertical-align: middle; flex-shrink: 0;
  }
  #rcb-tooltip {
    display: none;
    position: fixed;
    background: var(--ink); color: var(--paper);
    font-size: 0.75rem; line-height: 1.75;
    padding: 14px 16px; border-radius: 3px;
    width: 280px; z-index: 99999;
    font-weight: 400; letter-spacing: 0; text-transform: none;
    white-space: normal; word-wrap: break-word;
    box-shadow: 0 6px 24px rgba(0,0,0,0.35);
    pointer-events: none;
  }
</style>
</head>
<body style="margin:0;padding:0;background:#fff;">

<div class="container">

  <div class="intro">
    Fill in your cushion details below and we'll email you a rough quote soon.
  </div>

  <!-- Customer Info -->
  <div class="section">
    <div class="section-header"><div class="dot"></div> Your Information</div>
    <div class="section-body">
      <div class="form-grid">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" id="custName" placeholder="First Last" required />
        </div>
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="custEmail" placeholder="you@email.com" required />
        </div>
      </div>
    </div>
  </div>

  <!-- Cushion Details -->
  <div class="section">
    <div class="section-header"><div class="dot"></div> Cushion Details</div>
    <div class="section-body">
      <div style="overflow-x:auto">
        <table class="cushion-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Qty</th>
              <th>Width (in)</th>
              <th>Length (in)</th>
              <th>Thickness (in)</th>
              <th class="foam-th">Foam <span class="foam-info" data-tip="Foam is rated by density. Higher density = longer lasting and higher comfort. All densities come in soft, medium, firm, or extra-firm. Density 2 is high density and the most commonly used.">?</span></th>
              <th class="foam-th">Fabric $/yd <span class="foam-info" data-tip="Fabric and vinyl come in a wide range of prices. $60/yd is an average price.">?</span></th>
              <th class="foam-th">Back? <span class="foam-info" data-tip="Is the cushion double sided/reversible?">?</span></th>
              <th>Images</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="cushionRows"></tbody>
        </table>
      </div>
      <button type="button" class="add-btn" onclick="addRow()">+ Add Another Cushion</button>
    </div>
  </div>

  <!-- Extras -->
  <div class="section">
    <div class="section-header"><div class="dot"></div> Extras</div>
    <div class="section-body">
      <div class="extras-grid">
        <div class="extra-item" id="ex-zip" onclick="toggleExtra('zip')">
          <input type="checkbox" id="zip">
          <div class="extra-check" id="check-zip"></div>
          <span class="extra-label">Zipper / Velcro</span>
        </div>
        <div class="extra-item" id="ex-wrap" onclick="toggleExtra('wrap')">
          <input type="checkbox" id="wrap">
          <div class="extra-check" id="check-wrap"></div>
          <span class="extra-label">Wrap (Batting)</span>
        </div>
        <div class="extra-item" id="ex-uphol" onclick="toggleExtra('uphol')">
          <input type="checkbox" id="uphol">
          <div class="extra-check" id="check-uphol"></div>
          <span class="extra-label">Upholstery <span class="foam-info" data-tip="Are we mounting or stapling the cushion/s to something?">?</span></span>
        </div>
      </div>
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" onclick="submitQuote()">
    Get My Quote →
  </button>

  <div id="statusMsg" class="status"></div>

</div>

<script>
// ── Config — update this URL after deploying your server ──────────────────
const SERVER_URL = 'https://rcb-quote-server.onrender.com';

let rowCount = 0;
const extras = { zip: false, wrap: false, uphol: false };

window.onload = function() {
  addRow();
  // Delegated listener — finds the preview div by proximity to the input
  document.getElementById('cushionRows').addEventListener('change', function(e) {
    var inp = e.target;
    if (inp.tagName === 'INPUT' && inp.type === 'file') {
      // Walk up to the <td>, then find the preview div inside it
      var td = inp.closest('td');
      var preview = td ? td.querySelector('.img-previews') : null;
      var rowId = inp.closest('tr') ? inp.closest('tr').id.replace('row-', '') : null;
      if (preview && rowId) handleImages(parseInt(rowId), inp, preview);
    }
  });
};

function addRow(defaults) {
  defaults = defaults || {};
  rowCount++;
  const id = rowCount;
  const tbody = document.getElementById('cushionRows');
  const tr = document.createElement('tr');
  tr.id = 'row-' + id;
  tr.innerHTML =
    '<td class="row-num" style="color:#bbb;font-size:0.72rem;padding:5px 6px"></td>' +
    '<td><input data-field="qty" type="number" value="' + (defaults.qty||1) + '" min="1" style="width:55px" /></td>' +
    '<td><input data-field="width" type="number" value="' + (defaults.w||'') + '" min="1" placeholder="e.g. 24" style="width:70px" /></td>' +
    '<td><input data-field="length" type="number" value="' + (defaults.l||'') + '" min="1" placeholder="e.g. 24" style="width:70px" /></td>' +
    '<td><input data-field="thickness" type="number" value="' + (defaults.t||'') + '" min="0.5" step="0.5" placeholder="e.g. 4" style="width:70px" /></td>' +
    '<td><select data-field="density" style="width:85px"><option value="1">1 lb</option><option value="2" selected>2 lb</option><option value="2.5">2.5 lb</option><option value="3">3 lb</option><option value="MEM">Memory</option><option value="LTX">Latex</option></select></td>' +
    '<td><input data-field="fabricPrice" type="number" value="60" min="1" style="width:65px" /></td>' +
    '<td><select data-field="hasBack" style="width:58px"><option value="y">Yes</option><option value="n">No</option></select></td>' +
    '<td id="imgcell-' + id + '">' +
      '<label class="img-upload-btn" title="Upload images" style="cursor:pointer">+ Photos' +
        '<input type="file" data-field="images" accept="image/*" multiple style="position:absolute;opacity:0;width:1px;height:1px" />' +
      '</label>' +
      '<div class="img-previews"></div>' +
    '</td>' +
    '<td>' + (rowCount > 1 ? '<button type="button" class="remove-btn" onclick="removeRow(' + id + ')">×</button>' : '') + '</td>';
  tbody.appendChild(tr);
  // Renumber all rows by position
  Array.from(tbody.querySelectorAll('tr')).forEach(function(r, i) {
    var cell = r.querySelector('.row-num');
    if (cell) cell.textContent = i + 1;
  });
}

function removeRow(id) {
  const row = document.getElementById('row-' + id);
  if (row) row.remove();
  delete imageStore[id];
}

// Store images per row: { rowId: [{name, data, type}] }
const imageStore = {};

function handleImages(rowId, input, preview) {
  if (!imageStore[rowId]) imageStore[rowId] = [];
  if (!preview) preview = document.querySelector('[data-preview-for="' + rowId + '"]');
  Array.from(input.files).forEach(function(file) {
    const reader = new FileReader();
    reader.onload = function(e) {
      imageStore[rowId].push({ name: file.name, data: e.target.result, type: file.type });
      const thumb = document.createElement('div');
      thumb.className = 'img-thumb';
      thumb.innerHTML = '<img src="' + e.target.result + '" /><span>' + file.name.substring(0, 12) + '</span>';
      preview.appendChild(thumb);
    };
    reader.readAsDataURL(file);
  });
  // Reset input so same file can be re-added if needed
  input.value = '';
}

function toggleExtra(key) {
  extras[key] = !extras[key];
  const el = document.getElementById('ex-' + key);
  const check = document.getElementById('check-' + key);
  if (extras[key]) { el.classList.add('checked'); check.textContent = '\u2713'; }
  else { el.classList.remove('checked'); check.textContent = ''; }
}

function setStatus(type, html) {
  const el = document.getElementById('statusMsg');
  el.className = 'status ' + type;
  el.innerHTML = html;
  el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

async function submitQuote() {
  const name  = document.getElementById('custName').value.trim();
  const email = document.getElementById('custEmail').value.trim();

  if (!name || !email) { alert('Please enter your name and email address.'); return; }
  if (!/\S+@\S+\.\S+/.test(email)) { alert('Please enter a valid email address.'); return; }

  const rows = document.querySelectorAll('#cushionRows tr');
  const cushions = [];

  rows.forEach(function(row) {
    const rowId = parseInt(row.id.replace('row-', ''));
    const qty         = parseFloat(row.querySelector('[data-field="qty"]').value) || 1;
    const width       = parseFloat(row.querySelector('[data-field="width"]').value);
    const length      = parseFloat(row.querySelector('[data-field="length"]').value);
    const thickness   = parseFloat(row.querySelector('[data-field="thickness"]').value);
    const density     = row.querySelector('[data-field="density"]').value;
    const fabricPrice = parseFloat(row.querySelector('[data-field="fabricPrice"]').value) || 60;
    const hasBack     = row.querySelector('[data-field="hasBack"]').value;
    if (width > 0 && length > 0 && thickness > 0) {
      cushions.push({ qty, width, length, thickness, density, fabricPrice, hasBack, images: imageStore[rowId] || [] });
    }
  });

  if (!cushions.length) { alert('Please enter at least one cushion with dimensions.'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  setStatus('loading', 'Calculating your quote and sending email\u2026');

  try {
    const res = await fetch(SERVER_URL + '/api/quote', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ customerName: name, customerEmail: email, cushions, extras })
    });

    const data = await res.json();

    if (res.status === 429 || data.error === 'limit_reached') {
      setStatus('limit',
        '<div class="big">Quote Limit Reached</div>' +
        '<div style="font-size:0.8rem;color:#666;line-height:1.8;margin-bottom:14px">' + data.message + '</div>' +
        '<a href="mailto:info@rcb.ca" style="display:inline-block;background:#1a1208;color:#f5f0e8;padding:9px 20px;font-family:DM Mono,monospace;font-size:0.72rem;letter-spacing:0.1em;text-decoration:none;border-radius:2px;">Email RCB Directly</a>'
      );
      btn.disabled = false;
      return;
    }

    if (!res.ok || data.error) throw new Error(data.error || 'Server error');

    setStatus('success',
      '<div class="big">\u2713 Request Received!</div>' +
      'Thank you <strong>' + name + '</strong>! Your quote request has been submitted successfully.<br><br>' +
      'Our team will review your request and be in touch at <strong>' + email + '</strong> shortly.<br><br>' +
      '<strong>Estimated Total: ' + data.total + '</strong>'
    );
    btn.textContent = 'Quote Sent \u2713';

  } catch (err) {
    setStatus('error', 'Something went wrong: ' + err.message + '<br><small style="color:#999">Check that your server is running at: ' + SERVER_URL + '</small>');
    btn.disabled = false;
  }
}
// Tooltip system
(function() {
  var tip = document.createElement('div');
  tip.id = 'rcb-tooltip';
  document.body.appendChild(tip);

  document.querySelectorAll('.foam-info').forEach(function(el) {
    el.addEventListener('mouseenter', function(e) {
      tip.innerHTML = el.getAttribute('data-tip');
      tip.style.display = 'block';
      positionTip(e);
    });
    el.addEventListener('mousemove', positionTip);
    el.addEventListener('mouseleave', function() {
      tip.style.display = 'none';
    });
  });

  function positionTip(e) {
    var x = Math.min(e.clientX + 14, window.innerWidth - 295);
    var y = e.clientY - tip.offsetHeight - 14;
    if (y < 8) y = e.clientY + 20;
    tip.style.left = x + 'px';
    tip.style.top = y + 'px';
  }
})();

</script>
</body>
</html>
